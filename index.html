<head>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3499536226981500" crossorigin="anonymous"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');

        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --glass-bg: rgba(20, 20, 20, 0.55);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: rgba(0, 0, 0, 0.4);
            --item-bg: rgba(255, 255, 255, 0.08);
            --picker-bg: rgba(0, 0, 0, 0.4);
            --highlight-bg: rgba(255, 255, 255, 0.06);
            --active-color: #0a84ff;
            --active-shadow: rgba(10, 132, 255, 0.5);
            --time-color: #32d74b;
            --sphere-1: #ff2a6d;
            --sphere-2: #05d5ff;
            --sphere-3: #5e5ce6;
            --pop-glow: rgba(255, 255, 255, 0.8);
            --select-bg: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg-color: #e5e5ea;
            --text-color: #1c1c1e;
            --text-muted: rgba(0, 0, 0, 0.5);
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: rgba(0, 0, 0, 0.05);
            --item-bg: rgba(255, 255, 255, 0.5);
            --picker-bg: rgba(255, 255, 255, 0.4);
            --highlight-bg: rgba(0, 0, 0, 0.05);
            --active-color: #007aff;
            --active-shadow: rgba(0, 122, 255, 0.2);
            --time-color: #34c759;
            --sphere-1: #ffb6c1;
            --sphere-2: #87cefa;
            --sphere-3: #dda0dd;
            --pop-glow: rgba(0, 0, 0, 0.15);
            --select-bg: rgba(255, 255, 255, 0.6);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, .ios-background, .ios-glass-card, .picker-wrapper, .result-item, .live-time, .ad-container, .theme-btn, .lang-selector, .gradient-sphere { transition: background-color 0.5s ease, background 0.5s ease, color 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: '-apple-system', 'BlinkMacSystemFont', 'Tajawal', sans-serif; background: var(--bg-color); color: var(--text-color); overflow: hidden; }

        body.capturing .controls { opacity: 0; visibility: hidden; transition: none; }
        body.capturing .ad-container { display: none !important; }
        body.capturing .watermark { display: block !important; }

        .ios-background { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: var(--bg-color); }
        .gradient-sphere { position: absolute; border-radius: 50%; filter: blur(100px); animation: float 20s infinite ease-in-out; }
        .sphere-1 { width: 70vw; height: 70vw; background: var(--sphere-1); top: -15%; right: -15%; }
        .sphere-2 { width: 60vw; height: 60vw; background: var(--sphere-2); bottom: -15%; left: -15%; animation-delay: -5s; }
        .sphere-3 { width: 50vw; height: 50vw; background: var(--sphere-3); top: 40%; left: 30%; animation-delay: -10s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 50% { transform: translate(20px, -30px) scale(1.05); } 100% { transform: translate(0, 0) scale(1); } }

        .ios-glass-card { background: var(--glass-bg); backdrop-filter: blur(50px) saturate(200%); -webkit-backdrop-filter: blur(50px) saturate(200%); width: 100%; height: 100%; padding: 30px 20px; overflow-y: auto; position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        .content-wrapper { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 20px; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 1px solid var(--glass-border); }
        h1 { margin: 0; font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; color: var(--text-color); }
        .controls { display: flex; gap: 8px; align-items: center; }
        .theme-btn, .lang-selector { background: var(--select-bg); border: 1px solid var(--glass-border); color: var(--text-color); border-radius: 14px; font-family: inherit; outline: none; cursor: pointer; backdrop-filter: blur(10px); -webkit-appearance: none; }
        .theme-btn { padding: 6px 10px; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .lang-selector { padding: 8px 12px; font-size: 0.95rem; font-weight: 500; }
        .lang-selector option { background: var(--bg-color); color: var(--text-color); }

        .picker-wrapper { background: var(--picker-bg); border-radius: 28px; padding: 15px 0; border: 1px solid var(--glass-border); box-shadow: inset 0 10px 30px var(--glass-shadow); width: 100%; }
        .picker-labels { display: flex; justify-content: space-around; margin-bottom: 10px; color: var(--text-muted); font-size: 1rem; font-weight: 700; }
        .date-picker-container { display: flex; justify-content: space-around; height: 200px; position: relative; overflow: hidden; mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent); -webkit-mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent); }
        .picker-highlight { position: absolute; top: 50%; left: 5%; right: 5%; height: 40px; transform: translateY(-50%); background: var(--highlight-bg); border-radius: 12px; pointer-events: none; z-index: 0; }
        
        .picker-column { flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -ms-overflow-style: none; padding: 80px 0; position: relative; z-index: 1; text-align: center; cursor: grab; }
        .picker-column:active { cursor: grabbing; }
        .picker-column::-webkit-scrollbar { display: none; }
        
        .picker-item { height: 40px; line-height: 40px; scroll-snap-align: center; color: var(--text-muted); font-size: 1.3rem; font-weight: 500; font-family: -apple-system, BlinkMacSystemFont, monospace; cursor: grab; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        .picker-item.active { transform: scale(1.2); color: var(--active-color); font-weight: 700; text-shadow: 0 0 12px var(--active-shadow); }

        .results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; }
        .result-item { background: var(--item-bg); border-radius: 24px; padding: 20px 5px; border: 1px solid var(--glass-border); display: flex; flex-direction: column; align-items: center; }
        .num, .time-num { display: inline-block; will-change: transform, text-shadow; }
        .num { font-size: 2.5rem; font-weight: 700; color: var(--text-color); line-height: 1.1; }
        .label { font-size: 0.95rem; color: var(--text-muted); margin-top: 8px; text-align: center; }

        .live-time { background: var(--picker-bg); border-radius: 20px; padding: 18px; display: flex; justify-content: center; gap: 25px; border: 1px solid var(--glass-border); width: 100%; }
        .time-part { display: flex; align-items: baseline; gap: 6px; }
        .time-num { font-size: 1.6rem; font-weight: 700; color: var(--time-color); font-family: monospace; }
        .time-label { font-size: 0.9rem; color: var(--text-muted); }

        @keyframes popNumber { 0% { transform: scale(1); text-shadow: 0 0 0px transparent; } 50% { transform: scale(1.25); text-shadow: 0 0 15px var(--pop-glow); } 100% { transform: scale(1); text-shadow: 0 0 0px transparent; } }
        .animate-pop { animation: popNumber 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .ad-container { background: var(--item-bg); border: 1px dashed var(--glass-border); border-radius: 18px; padding: 15px; text-align: center; min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; margin-top: auto; }
        .ad-badge { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .watermark { display: none; text-align: center; margin-top: auto; padding: 20px; color: var(--text-muted); font-size: 1rem; font-weight: 500; letter-spacing: 0.5px; opacity: 0.8; }
    </style>
</head>
<body>

    <script>
        const htmlTag = document.getElementById('html-tag');
        const themeBtn = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme') || 'dark';
        htmlTag.setAttribute('data-theme', savedTheme);
        themeBtn.innerText = savedTheme === 'light' ? '🌙' : '☀️';

        function toggleTheme() {
            const newTheme = htmlTag.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            htmlTag.setAttribute('data-theme', newTheme);
            themeBtn.innerText = newTheme === 'light' ? '🌙' : '☀️';
            localStorage.setItem('theme', newTheme);
        }

        function takeScreenshot() {
            const captureBtn = document.getElementById('capture-btn');
            captureBtn.innerText = '⏳'; 
            document.body.classList.add('capturing');

            setTimeout(() => {
                html2canvas(document.body, {
                    scale: 2, 
                    useCORS: true,
                    backgroundColor: getComputedStyle(document.body).backgroundColor,
                    windowWidth: document.body.scrollWidth,
                    windowHeight: document.body.scrollHeight
                }).then(canvas => {
                    document.body.classList.remove('capturing');
                    captureBtn.innerText = '📸';
                    const link = document.createElement('a');
                    link.download = `Age-Calculator-${new Date().getTime()}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                }).catch(err => {
                    console.error("خطأ في التقاط الصورة:", err);
                    document.body.classList.remove('capturing');
                    captureBtn.innerText = '📸';
                });
            }, 150);
        }

        let selectedYear = 2000;
        let selectedMonth = 1;
        let selectedDay = 1;
        const itemHeight = 40; 

        const translations = {
            ar: { title: "حساب العمر", year: "سنة", month: "شهر", day: "يوم", years: "سنوات", months: "أشهر", days: "أيام", h: "س", m: "د", s: "ث", ad: "مساحة إعلانية", wm: "تم الحساب عبر حاسبة العمر ✨", rtl: true },
            en: { title: "Age Calculator", year: "Year", month: "Month", day: "Day", years: "Years", months: "Months", days: "Days", h: "h", m: "m", s: "s", ad: "Sponsored Ad Space", wm: "Calculated by Age Calculator ✨", rtl: false },
            zh: { title: "年龄计算器", year: "年", month: "月", day: "日", years: "岁", months: "月", days: "天", h: "时", m: "分", s: "秒", ad: "赞助广告位", wm: "由年龄计算器计算 ✨", rtl: false },
            hi: { title: "आयु कैलकुलेटर", year: "वर्ष", month: "महीना", day: "दिन", years: "वर्ष", months: "महीने", days: "दिन", h: "घं", m: "मि", s: "से", ad: "विज्ञापन", wm: "आयु कैलकुलेटर द्वारा गणना की गई ✨", rtl: false },
            es: { title: "Calculadora de Edad", year: "Año", month: "Mes", day: "Día", years: "Años", months: "Meses", days: "Días", h: "h", m: "m", s: "s", ad: "Publicidad", wm: "Calculado por Calculadora de Edad ✨", rtl: false },
            fr: { title: "Calculateur d'Âge", year: "Année", month: "Mois", day: "Jour", years: "Années", months: "Mois", days: "Jours", h: "h", m: "m", s: "s", ad: "Publicité", wm: "Calculé par Calculateur d'Âge ✨", rtl: false },
            bn: { title: "বয়স ক্যালকুলেটর", year: "বছর", month: "মাস", day: "দিন", years: "বছর", months: "মাস", days: "দিন", h: "ঘ", m: "মি", s: "সে", ad: "বিজ্ঞাপন", wm: "বয়স ক্যালকুলেটর দ্বারা গণনা করা হয়েছে ✨", rtl: false },
            ru: { title: "Калькулятор Возраста", year: "Год", month: "Месяц", day: "День", years: "Лет", months: "Месяцев", days: "Дней", h: "ч", m: "м", s: "с", ad: "Реклама", wm: "Рассчитано Калькулятором Возраста ✨", rtl: false },
            pt: { title: "Calculadora de Idade", year: "Ano", month: "Mês", day: "Dia", years: "Anos", months: "Meses", days: "Dias", h: "h", m: "m", s: "s", ad: "Publicidade", wm: "Calculado por Calculadora de Idade ✨", rtl: false },
            ur: { title: "عمر کیلکولیٹر", year: "سال", month: "مہینہ", day: "دن", years: "سال", months: "مہینے", days: "دن", h: "گھنٹے", m: "منٹ", s: "سیکنڈ", ad: "اشتہار", wm: "عمر کیلکولیٹر کے ذریعہ شمار کیا گیا ✨", rtl: true },
            id: { title: "Kalkulator Umur", year: "Tahun", month: "Bulan", day: "Hari", years: "Tahun", months: "Bulan", days: "Hari", h: "j", m: "m", s: "d", ad: "Iklan", wm: "Dihitung oleh Kalkulator Umur ✨", rtl: false },
            de: { title: "Altersrechner", year: "Jahr", month: "Monat", day: "Tag", years: "Jahre", months: "Monate", days: "Tage", h: "Std", m: "Min", s: "Sek", ad: "Werbung", wm: "Berechnet durch Altersrechner ✨", rtl: false },
            ja: { title: "年齢計算機", year: "年", month: "月", day: "日", years: "歳", months: "ヶ月", days: "日", h: "時", m: "分", s: "秒", ad: "広告", wm: "年齢計算機によって計算されました ✨", rtl: false },
            mr: { title: "वय कॅल्क्युलेटर", year: "वर्ष", month: "महिना", day: "दिवस", years: "वर्षे", months: "महिने", days: "दिवस", h: "तास", m: "मिनिटे", s: "सेकंद", ad: "जाहिरात", wm: "वय कॅल्क्युलेटर द्वारे गणना केली ✨", rtl: false },
            te: { title: "వయస్సు కాలిక్యులేటర్", year: "సం.", month: "నెల", day: "రోజు", years: "సంవత్సరాలు", months: "నెలలు", days: "రోజులు", h: "గం", m: "ని", s: "సె", ad: "ప్రకటన", wm: "వయస్సు కాలిక్యులేటర్ ద్వారా లెక్కించబడింది ✨", rtl: false }
        };

        function changeLanguage(langCode) {
            const langData = translations[langCode] || translations['en'];
            document.getElementById('main-title').innerText = langData.title;
            document.getElementById('lbl-year').innerText = langData.year;
            document.getElementById('lbl-month').innerText = langData.month;
            document.getElementById('lbl-day').innerText = langData.day;
            document.getElementById('lbl-res-years').innerText = langData.years;
            document.getElementById('lbl-res-months').innerText = langData.months;
            document.getElementById('lbl-res-days').innerText = langData.days;
            document.getElementById('lbl-res-hours').innerText = langData.h;
            document.getElementById('lbl-res-minutes').innerText = langData.m;
            document.getElementById('lbl-res-seconds').innerText = langData.s;
            document.getElementById('lbl-ad').innerText = langData.ad;
            document.getElementById('watermark-text').innerText = langData.wm;

            htmlTag.setAttribute('dir', langData.rtl ? 'rtl' : 'ltr');
            htmlTag.setAttribute('lang', langCode);
            document.querySelector('.date-picker-container').style.flexDirection = 'row';
        }

        function autoDetectLanguage() {
            const userLangFull = navigator.language || navigator.userLanguage;
            const shortLang = userLangFull.substring(0, 2).toLowerCase();
            const selectedLang = translations[shortLang] ? shortLang : 'en';
            document.getElementById('langSelect').value = selectedLang;
            changeLanguage(selectedLang);
        }

        function buildColumn(columnId, min, max, type) {
            const container = document.getElementById(columnId);
            container.innerHTML = ''; 
            for (let i = min; i <= max; i++) {
                let div = document.createElement('div');
                div.className = 'picker-item';
                div.dataset.value = i;
                div.innerText = String(i).padStart(2, '0');
                container.appendChild(div);
            }
            setupScrollListener(columnId, type);
            setupMouseDrag(container); 
        }

        function setupScrollListener(columnId, type) {
            const container = document.getElementById(columnId);
            container.addEventListener('scroll', () => {
                const items = container.querySelectorAll('.picker-item');
                let index = Math.round(container.scrollTop / itemHeight);
                if (index < 0) index = 0;
                if (index >= items.length) index = items.length - 1;

                items.forEach((item, i) => {
                    if (i === index) {
                        if (!item.classList.contains('active')) {
                            item.classList.add('active');
                            const val = parseInt(item.dataset.value);
                            if (type === 'year' && selectedYear !== val) { selectedYear = val; checkDaysUpdate(); calculateAge(); }
                            if (type === 'month' && selectedMonth !== val) { selectedMonth = val; checkDaysUpdate(); calculateAge(); }
                            if (type === 'day' && selectedDay !== val) { selectedDay = val; calculateAge(); }
                        }
                    } else {
                        item.classList.remove('active');
                    }
                });
            });
        }

        function setupMouseDrag(container) {
            let isDown = false;
            let startY;
            let scrollTop;

            container.addEventListener('mousedown', (e) => {
                isDown = true;
                startY = e.pageY - container.offsetTop;
                scrollTop = container.scrollTop;
                container.style.scrollSnapType = 'none'; 
            });

            container.addEventListener('mouseleave', () => {
                if(!isDown) return;
                isDown = false;
                container.style.scrollSnapType = 'y mandatory'; 
                snapToClosest(container);
            });

            container.addEventListener('mouseup', () => {
                if(!isDown) return;
                isDown = false;
                container.style.scrollSnapType = 'y mandatory';
                snapToClosest(container);
            });

            container.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const y = e.pageY - container.offsetTop;
                const walk = (y - startY) * 1.5; 
                container.scrollTop = scrollTop - walk;
            });
        }

        function snapToClosest(container) {
            let index = Math.round(container.scrollTop / itemHeight);
            container.scrollTo({ top: index * itemHeight, behavior: 'smooth' });
        }

        function checkDaysUpdate() {
            const daysInMonth = new Date(selectedYear, selectedMonth, 0).getDate();
            const currentDaysCount = document.getElementById('col-day').querySelectorAll('.picker-item').length;
            if (daysInMonth !== currentDaysCount) {
                if (selectedDay > daysInMonth) selectedDay = daysInMonth;
                buildColumn('col-day', 1, daysInMonth, 'day');
                scrollToValue('col-day', selectedDay);
            }
        }

        function scrollToValue(columnId, value) {
            const container = document.getElementById(columnId);
            const items = Array.from(container.querySelectorAll('.picker-item'));
            const index = items.findIndex(el => parseInt(el.dataset.value) === value);
            if (index !== -1) { container.scrollTop = index * itemHeight; }
        }

        function updateAnimatedNumber(elementId, newValue) {
            const el = document.getElementById(elementId);
            if (el.innerText !== String(newValue)) {
                el.innerText = newValue;
                el.classList.remove('animate-pop');
                void el.offsetWidth;
                el.classList.add('animate-pop');
            }
        }

        function calculateAge() {
            const birthDate = new Date(selectedYear, selectedMonth - 1, selectedDay);
            const now = new Date();

            if (now < birthDate) {
                updateAnimatedNumber('res-years', '0');
                updateAnimatedNumber('res-months', '0');
                updateAnimatedNumber('res-days', '0');
                return;
            }

            let years = now.getFullYear() - birthDate.getFullYear();
            let months = now.getMonth() - birthDate.getMonth();
            let days = now.getDate() - birthDate.getDate();

            if (days < 0) { months--; days += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
            if (months < 0) { years--; months += 12; }

            updateAnimatedNumber('res-years', years);
            updateAnimatedNumber('res-months', months);
            updateAnimatedNumber('res-days', days);
            
            updateAnimatedNumber('res-hours', String(now.getHours()).padStart(2, '0'));
            updateAnimatedNumber('res-minutes', String(now.getMinutes()).padStart(2, '0'));
            updateAnimatedNumber('res-seconds', String(now.getSeconds()).padStart(2, '0'));
        }

        const currentYear = new Date().getFullYear();
        autoDetectLanguage();
        
        buildColumn('col-year', 1900, currentYear, 'year');
        buildColumn('col-month', 1, 12, 'month');
        buildColumn('col-day', 1, 31, 'day');

        setTimeout(() => {
            scrollToValue('col-year', 2000);
            scrollToValue('col-month', 1);
            scrollToValue('col-day', 1);
        }, 50);

        setInterval(() => {
            const now = new Date();
            updateAnimatedNumber('res-hours', String(now.getHours()).padStart(2, '0'));
            updateAnimatedNumber('res-minutes', String(now.getMinutes()).padStart(2, '0'));
            updateAnimatedNumber('res-seconds', String(now.getSeconds()).padStart(2, '0'));
        }, 1000);
    </script>
</body>
</html>
